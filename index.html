<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2f6bff" />
    <title>保质期管理</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --surface: #ffffff;
        --line: #e8ebf3;
        --text: #182132;
        --muted: #8b94a7;
        --blue: #2f6bff;
        --blue-soft: #edf3ff;
        --amber: #d79a19;
        --red: #d24c4c;
        --green: #1d9a63;
        --shadow: 0 18px 40px rgba(34, 50, 84, 0.08);
        --radius-xl: 24px;
        --radius-lg: 20px;
        --radius-md: 16px;
        --radius-sm: 12px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: linear-gradient(180deg, #fcfdff 0%, #f2f5fb 100%);
        color: var(--text);
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        padding: 0;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        background: none;
        cursor: pointer;
      }

      .phone-shell {
        width: min(100%, 420px);
        min-height: 100dvh;
        background: linear-gradient(180deg, #fdfefe 0%, #f5f7fb 100%);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      #app {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .page {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        padding: calc(20px + env(safe-area-inset-top, 0px)) 14px 8px;
        background: #ffffff;
        position: sticky;
        top: 0;
        z-index: 3;
      }

      .topbar-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .icon-button {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: var(--text);
        background: #ffffff;
        border: 1px solid var(--line);
        box-shadow: 0 6px 16px rgba(24, 33, 50, 0.05);
        flex-shrink: 0;
      }

      .title-wrap h1 {
        margin: 0;
        font-size: 17px;
        line-height: 1.25;
        letter-spacing: -0.01em;
      }

      .subtitle {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }

      .search-panel {
        margin-top: 12px;
      }

      .search-input,
      .text-field {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #ffffff;
        padding: 14px 15px;
        color: var(--text);
        font-size: 16px;
        -webkit-appearance: none;
        appearance: none;
      }

      .tabs {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        align-items: center;
        border-bottom: 1px solid var(--line);
      }

      .tab {
        padding: 12px 0 11px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
        position: relative;
      }

      .tab.active {
        color: var(--blue);
      }

      .tab.active::after {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: -1px;
        height: 2px;
        border-radius: 999px;
        background: var(--blue);
      }

      .sort-row {
        padding: 10px 14px 0;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .sort-label {
        font-size: 12px;
        color: var(--muted);
      }

      .sort-chip {
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #ffffff;
        color: #5f6880;
        padding: 6px 11px;
        font-size: 12px;
        line-height: 1;
      }

      .sort-chip.active {
        color: #ffffff;
        background: var(--blue);
        border-color: var(--blue);
      }

      .content {
        flex: 1;
        min-height: 0;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        padding: 12px 14px calc(104px + env(safe-area-inset-bottom, 0px));
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .product-card,
      .panel,
      .batch-card,
      .empty-state {
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        box-shadow: 0 8px 22px rgba(34, 50, 84, 0.04);
      }

      .product-card {
        overflow: hidden;
      }

      .product-main {
        padding: 16px 16px 14px;
      }

      .product-head {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .product-icon {
        width: 30px;
        height: 30px;
        border-radius: 9px;
        display: grid;
        place-items: center;
        background: transparent;
        font-size: 20px;
        flex-shrink: 0;
      }

      .product-title {
        font-size: 16px;
        font-weight: 700;
      }

      .product-meta {
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
      }

      .status-dot {
        margin-left: auto;
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 11px;
        font-weight: 700;
      }

      .status-dot.active {
        background: #ebf8f1;
        color: var(--green);
      }

      .status-dot.removeSoon {
        background: #fff5e7;
        color: var(--amber);
      }

      .status-dot.expired {
        background: #ffeded;
        color: var(--red);
      }

      .status-dot.archived {
        background: #eef1f6;
        color: #6f7a8d;
      }

      .date-summary {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 22px;
      }

      .date-summary-item {
        min-width: 0;
      }

      .date-summary-label {
        color: var(--muted);
        font-size: 12px;
      }

      .date-summary-value {
        margin-top: 5px;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .date-summary-value.removeSoon {
        color: var(--amber);
      }

      .date-summary-value.expired {
        color: var(--red);
      }

      .countdown {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
      }

      .product-footer {
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        border-top: 1px solid #f5f6fa;
        padding-top: 9px;
      }

      .small-chip {
        padding: 0;
        border-radius: 0;
        font-size: 11px;
        background: transparent;
        color: #98a1b3;
      }

      .link-button {
        color: #a3acbc;
        font-weight: 500;
        font-size: 11px;
        letter-spacing: 0.01em;
        padding: 2px 0;
      }

      .batch-list {
        display: none;
        padding: 0 16px 16px;
        gap: 10px;
      }

      .product-card.expanded .batch-list {
        display: grid;
      }

      .batch-card {
        padding: 14px;
        border-radius: 18px;
        box-shadow: none;
      }

      .batch-top,
      .batch-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .batch-label {
        font-size: 13px;
        font-weight: 700;
      }

      .batch-grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .batch-cell {
        border-radius: 14px;
        background: #f7f9fd;
        padding: 10px;
      }

      .batch-cell-label {
        color: var(--muted);
        font-size: 11px;
      }

      .batch-cell-value {
        margin-top: 5px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.5;
      }

      .ghost-button,
      .primary-button,
      .danger-button {
        padding: 12px 14px;
        border-radius: 14px;
        font-weight: 700;
      }

      .ghost-button {
        background: #f4f6fb;
        color: var(--text);
      }

      .primary-button {
        background: linear-gradient(135deg, #2f6bff 0%, #3f7cff 100%);
        color: #ffffff;
      }

      .danger-button {
        background: #ffefef;
        color: var(--red);
      }

      .panel {
        padding: 18px 16px;
      }

      .field {
        margin-top: 16px;
      }

      .field-label {
        display: block;
        margin-bottom: 8px;
        color: #5f6880;
        font-size: 13px;
        font-weight: 700;
      }

      .segment {
        display: inline-grid;
        grid-template-columns: repeat(2, 1fr);
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
        background: #f5f7fb;
      }

      .segment button {
        min-width: 56px;
        padding: 12px 14px;
        color: #61708a;
        font-weight: 700;
      }

      .segment button.active {
        background: var(--blue);
        color: #ffffff;
      }

      .inline-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .quick-grid,
      .category-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .quick-chip,
      .category-chip {
        border: 1px solid var(--line);
        background: #ffffff;
        color: #637089;
      }

      .quick-chip {
        border-radius: 999px;
        padding: 8px 12px;
      }

      .quick-chip.active {
        background: var(--blue-soft);
        border-color: #cfe0ff;
        color: var(--blue);
      }

      .category-chip {
        min-width: calc(25% - 6px);
        border-radius: 18px;
        padding: 12px 8px;
        text-align: center;
      }

      .category-chip.active {
        background: var(--blue-soft);
        border-color: #cfe0ff;
        color: var(--blue);
      }

      .category-icon {
        display: block;
        font-size: 20px;
        margin-bottom: 5px;
      }

      .preview-box {
        margin-top: 12px;
        border-radius: 18px;
        background: #f6f9ff;
        border: 1px solid #dce6ff;
        padding: 14px;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .preview-item {
        background: rgba(255, 255, 255, 0.88);
        border-radius: 14px;
        padding: 12px;
      }

      .preview-label {
        color: var(--muted);
        font-size: 12px;
      }

      .preview-value {
        margin-top: 6px;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.45;
      }

      .helper-text,
      .error-text {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.6;
      }

      .helper-text {
        color: var(--muted);
      }

      .error-text {
        color: var(--red);
      }

      .empty-state {
        min-height: 50vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 28px;
      }

      .empty-icon {
        font-size: 52px;
      }

      .empty-title {
        margin-top: 10px;
        font-size: 20px;
        font-weight: 700;
      }

      .empty-text {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.6;
      }

      .fab-layer {
        position: fixed;
        left: 50%;
        bottom: calc(80px + env(safe-area-inset-bottom, 0px));
        width: min(100%, 420px);
        transform: translateX(-50%);
        pointer-events: none;
      }

      .fab {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        margin-left: auto;
        margin-right: 16px;
        pointer-events: auto;
        display: grid;
        place-items: center;
        font-size: 30px;
        color: #ffffff;
        background: linear-gradient(135deg, #2f6bff 0%, #4b85ff 100%);
        box-shadow: 0 16px 30px rgba(47, 107, 255, 0.28);
      }

      .bottom-nav {
        margin-top: auto;
        padding: 8px 16px calc(10px + env(safe-area-inset-bottom, 0px));
        background: rgba(255, 255, 255, 0.98);
        border-top: 1px solid var(--line);
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .nav-item {
        padding: 8px 12px;
        border-radius: 14px;
        display: grid;
        justify-items: center;
        gap: 3px;
        color: var(--muted);
        font-weight: 700;
        font-size: 12px;
      }

      .nav-item.active {
        color: var(--blue);
        background: var(--blue-soft);
      }

      @media (min-width: 421px) {
        body {
          padding: 20px 0;
        }

        .phone-shell {
          min-height: min(920px, calc(100dvh - 40px));
          border-radius: 28px;
          border: 1px solid var(--line);
          box-shadow: 0 24px 60px rgba(40, 54, 86, 0.12);
        }
      }

      @media (max-width: 360px) {
        .batch-grid,
        .date-summary,
        .preview-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="phone-shell">
      <div id="app"></div>
    </div>

    <script type="module">
      import {
        calculateBatchDates,
        createBatchRecord,
        daysUntil,
        formatDisplayDate,
        formatIsoDate,
        groupProductsByName,
        sortProductGroups,
        summarizeProductGroup,
      } from './app-logic.mjs';

      const STORAGE_KEY = 'shelf-life-manager-v2';
      const todayIso = formatIsoDate(new Date());
      const quickValues = [3, 7, 10, 15, 30, 60, 90];
      const categories = [
        { id: 'dairy', label: '乳制品', icon: '🥛' },
        { id: 'meat', label: '肉类', icon: '🥩' },
        { id: 'snack', label: '零食', icon: '🍪' },
        { id: 'drink', label: '饮料', icon: '🥤' },
        { id: 'grain', label: '粮食', icon: '🍚' },
        { id: 'medicine', label: '药品', icon: '💊' },
        { id: 'cosmetic', label: '化妆品', icon: '💄' },
        { id: 'other', label: '其他', icon: '📦' },
      ];

      const state = {
        page: 'manage',
        filter: 'all',
        sortBy: 'urgency',
        searchVisible: false,
        search: '',
        expandedGroups: new Set(),
        batches: loadBatches(),
        formError: '',
        form: createDefaultForm(),
        calculator: {
          productionDate: todayIso,
          shelfLifeValue: '',
          shelfLifeUnit: 'days',
        },
      };

      const app = document.querySelector('#app');

      function createDefaultForm() {
        return {
          name: '',
          category: 'other',
          productionDate: todayIso,
          shelfLifeValue: '',
          shelfLifeUnit: 'days',
        };
      }

      function loadBatches() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveBatches() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.batches));
      }

      function createId() {
        return `batch-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function getCategoryMeta(categoryId) {
        return categories.find((item) => item.id === categoryId) || categories[categories.length - 1];
      }

      function getCounts() {
        const groups = groupProductsByName(state.batches, new Date());
        const activeBatches = state.batches.filter((batch) => !batch.archived);
        const removeSoon = activeBatches.filter((batch) => batch.removalDate <= todayIso && batch.expiryDate >= todayIso).length;
        const expired = activeBatches.filter((batch) => batch.expiryDate < todayIso).length;

        return {
          groupCount: groups.length,
          activeBatchCount: activeBatches.length,
          removeSoon,
          expired,
        };
      }

      function getVisibleGroups() {
        const groups = groupProductsByName(state.batches, new Date())
          .map((group) => {
            const matchedBatches = group.batches.filter((batch) => {
              if (batch.archived) return false;
              if (state.search && !batch.name.includes(state.search.trim())) return false;
              if (state.filter === 'removeSoon' && batch.status !== 'removeSoon') return false;
              if (state.filter === 'expired' && batch.status !== 'expired') return false;
              return true;
            });

            if (!matchedBatches.length) return null;

            return {
              ...group,
              batches: matchedBatches,
            };
          })
          .filter(Boolean);

        return sortProductGroups(groups, state.sortBy, new Date());
      }

      function getPreview(formState) {
        if (!formState.productionDate || !formState.shelfLifeValue) return null;
        try {
          return calculateBatchDates({
            productionDate: formState.productionDate,
            shelfLifeValue: Number(formState.shelfLifeValue),
            shelfLifeUnit: formState.shelfLifeUnit,
          });
        } catch {
          return null;
        }
      }

      function render() {
        const counts = getCounts();
        const groups = getVisibleGroups();
        const pageContent = state.page === 'manage'
          ? renderManagePage(counts, groups)
          : state.page === 'add'
            ? renderAddPage()
            : renderCalculatorPage();

        app.innerHTML = `
          <div class="page">
            ${pageContent}
            ${state.page === 'manage' ? renderBottomNav() : ''}
            ${state.page === 'manage' ? '<div class="fab-layer"><button class="fab" data-action="go-add">+</button></div>' : ''}
          </div>
        `;

        bindInputs();
      }

      function renderBottomNav() {
        return `
          <nav class="bottom-nav">
            <button class="nav-item ${state.page === 'manage' ? 'active' : ''}" data-nav="manage">
              <span>📋</span>
              <span>管理</span>
            </button>
            <button class="nav-item ${state.page === 'calculator' ? 'active' : ''}" data-nav="calculator">
              <span>🧮</span>
              <span>计算器</span>
            </button>
          </nav>
        `;
      }

      function renderManagePage(counts, groups) {
        return `
          <header class="topbar">
            <div class="topbar-row">
              <div class="title-wrap">
                <h1>保质期管理</h1>
                <div class="subtitle">共 ${counts.groupCount} 件商品</div>
              </div>
              <button class="icon-button" data-action="toggle-search" aria-label="搜索">🔍</button>
            </div>
            ${state.searchVisible ? `
              <div class="search-panel">
                <input class="search-input" type="search" placeholder="搜索商品名称" value="${escapeHtml(state.search)}" data-input="search" />
              </div>
            ` : ''}
            <div class="tabs">
              ${renderTab('all', '全部')}
              ${renderTab('removeSoon', '即将过期')}
              ${renderTab('expired', '已过期')}
            </div>
          </header>

          <div class="sort-row">
            <span class="sort-label">排序:</span>
            ${renderSortChip('urgency', '紧迫度')}
            ${renderSortChip('expiryDate', '到期日期')}
            ${renderSortChip('removalDate', '下架日期')}
            ${renderSortChip('name', '名称')}
          </div>

          <main class="content">
            ${
              groups.length
                ? `<div class="stack">${groups.map(renderProductCard).join('')}</div>`
                : `
                  <section class="empty-state">
                    <div>
                      <div class="empty-icon">📦</div>
                      <div class="empty-title">还没有符合条件的商品</div>
                      <div class="empty-text">点击右下角按钮进入新页面添加商品。</div>
                    </div>
                  </section>
                `
            }
          </main>
        `;
      }

      function renderAddPage() {
        return `
          <header class="topbar">
            <div class="topbar-row">
              <div class="topbar-left">
                <button class="icon-button" data-action="go-manage" aria-label="返回">←</button>
                <div class="title-wrap">
                  <h1>添加商品</h1>
                  <div class="subtitle">新页面录入，保存后自动返回管理页</div>
                </div>
              </div>
            </div>
          </header>

          <main class="content">
            <section class="panel">
              <div class="field">
                <label class="field-label" for="item-name">商品名称</label>
                <input id="item-name" class="text-field" type="text" maxlength="30" placeholder="例如：牛奶、面包、感冒药" value="${escapeHtml(state.form.name)}" data-form-input="name" />
              </div>

              <div class="field">
                <div class="field-label">分类</div>
                <div class="category-grid">
                  ${categories.map((category) => `
                    <button class="category-chip ${state.form.category === category.id ? 'active' : ''}" data-category="${category.id}">
                      <span class="category-icon">${category.icon}</span>
                      <span>${category.label}</span>
                    </button>
                  `).join('')}
                </div>
              </div>

              <div class="field">
                <label class="field-label" for="production-date">生产日期</label>
                <input id="production-date" class="text-field" type="date" value="${state.form.productionDate}" data-form-input="productionDate" />
              </div>

              <div class="field">
                <div class="field-label">保质期</div>
                <div class="inline-row">
                  <input class="text-field" type="number" min="1" inputmode="numeric" placeholder="输入数值" value="${escapeHtml(state.form.shelfLifeValue)}" data-form-input="shelfLifeValue" />
                  <div class="segment">
                    <button class="${state.form.shelfLifeUnit === 'days' ? 'active' : ''}" data-form-unit="days">天</button>
                    <button class="${state.form.shelfLifeUnit === 'months' ? 'active' : ''}" data-form-unit="months">月</button>
                  </div>
                </div>
                <div class="quick-grid" style="margin-top:12px;">
                  ${quickValues.map((value) => `<button class="quick-chip ${Number(state.form.shelfLifeValue) === value ? 'active' : ''}" data-form-quick="${value}">${value}${state.form.shelfLifeUnit === 'months' ? '月' : '天'}</button>`).join('')}
                </div>
              </div>

              <div class="preview-box" data-form-preview>
                ${renderFormPreview()}
              </div>

              ${state.formError ? `<div class="error-text">${escapeHtml(state.formError)}</div>` : ''}

              <div class="field" style="display:grid;grid-template-columns:1fr 1.2fr;gap:12px;">
                <button class="ghost-button" data-action="go-manage">取消</button>
                <button class="primary-button" data-action="submit-form">添加商品</button>
              </div>
            </section>
          </main>
        `;
      }

      function renderCalculatorPage() {
        return `
          <header class="topbar">
            <div class="topbar-row">
              <div class="title-wrap">
                <h1>保质期计算器</h1>
                <div class="subtitle">快速计算下架日和过期日</div>
              </div>
            </div>
          </header>

          <main class="content">
            <section class="panel">
              <div class="field">
                <label class="field-label" for="calc-production">生产日期</label>
                <input id="calc-production" class="text-field" type="date" value="${state.calculator.productionDate}" data-calc-input="productionDate" />
              </div>
              <div class="field">
                <div class="field-label">保质期</div>
                <div class="inline-row">
                  <input class="text-field" type="number" min="1" inputmode="numeric" placeholder="输入数值" value="${escapeHtml(state.calculator.shelfLifeValue)}" data-calc-input="shelfLifeValue" />
                  <div class="segment">
                    <button class="${state.calculator.shelfLifeUnit === 'days' ? 'active' : ''}" data-calc-unit="days">天</button>
                    <button class="${state.calculator.shelfLifeUnit === 'months' ? 'active' : ''}" data-calc-unit="months">月</button>
                  </div>
                </div>
                <div class="quick-grid" style="margin-top:12px;">
                  ${quickValues.map((value) => `<button class="quick-chip ${Number(state.calculator.shelfLifeValue) === value ? 'active' : ''}" data-calc-quick="${value}">${value}${state.calculator.shelfLifeUnit === 'months' ? '月' : '天'}</button>`).join('')}
                </div>
              </div>
              <div class="preview-box" data-calculator-preview>
                ${renderCalculatorPreview()}
              </div>
              <div class="helper-text">规则固定为：生产日期算第 1 天，下架日 = 过期日前 2 天。</div>
            </section>
          </main>

          ${renderBottomNav()}
        `;
      }

      function renderTab(filter, label) {
        return `<button class="tab ${state.filter === filter ? 'active' : ''}" data-filter="${filter}">${label}</button>`;
      }

      function renderSortChip(value, label) {
        return `<button class="sort-chip ${state.sortBy === value ? 'active' : ''}" data-sort="${value}">${label}</button>`;
      }

      function renderProductCard(group) {
        const category = getCategoryMeta(group.category);
        const summary = summarizeProductGroup(group, new Date());
        const expanded = state.expandedGroups.has(group.key);
        const removalClass = summary.status === 'expired' ? 'expired' : summary.status === 'removeSoon' ? 'removeSoon' : '';
        const expiryClass = summary.status === 'expired' ? 'expired' : '';

        return `
          <section class="product-card ${expanded ? 'expanded' : ''}">
            <div class="product-main">
              <div class="product-head">
                <div class="product-icon">${category.icon}</div>
                <div style="min-width:0;">
                  <div class="product-title">${escapeHtml(group.name)}</div>
                  <div class="product-meta">${group.batches.length} 个批次</div>
                </div>
              </div>

              <div class="date-summary">
                <div class="date-summary-item">
                  <div class="date-summary-label">下架日期</div>
                  <div class="date-summary-value ${removalClass}">${formatShortDate(summary.nextBatch.removalDate)}</div>
                  <div class="countdown">${formatCountdown(summary.removalCountdown, '下架')}</div>
                </div>
                <div class="date-summary-item">
                  <div class="date-summary-label">过期日期</div>
                  <div class="date-summary-value ${expiryClass}">${formatShortDate(summary.nextBatch.expiryDate)}</div>
                  <div class="countdown">${formatExpiryCountdown(summary.expiryCountdown)}</div>
                </div>
              </div>

              <div class="product-footer">
                <span class="small-chip">${category.label}</span>
                <button class="link-button" data-action="toggle-group" data-key="${escapeHtml(group.key)}">${expanded ? '收起明细' : '查看明细'}</button>
              </div>
            </div>

            <div class="batch-list">
              ${group.batches.map(renderBatchCard).join('')}
            </div>
          </section>
        `;
      }

      function renderBatchCard(batch) {
        return `
          <article class="batch-card">
            <div class="batch-top">
              <div class="batch-label">批次 #${escapeHtml(batch.id.slice(-4))}</div>
              <span class="status-dot ${batch.status}">${statusText(batch.status)}</span>
            </div>
            <div class="batch-grid">
              <div class="batch-cell">
                <div class="batch-cell-label">生产日期</div>
                <div class="batch-cell-value">${formatDisplayDate(batch.productionDate)}</div>
              </div>
              <div class="batch-cell">
                <div class="batch-cell-label">下架日</div>
                <div class="batch-cell-value">${formatDisplayDate(batch.removalDate)}</div>
              </div>
              <div class="batch-cell">
                <div class="batch-cell-label">过期日</div>
                <div class="batch-cell-value">${formatDisplayDate(batch.expiryDate)}</div>
              </div>
            </div>
            <div class="batch-actions" style="margin-top:12px;">
              <div class="helper-text" style="margin:0;">保质期 ${batch.shelfLifeValue}${batch.shelfLifeUnit === 'months' ? '个月' : '天'}</div>
              <div style="display:flex;gap:8px;">
                <button class="ghost-button" data-action="archive-batch" data-id="${batch.id}">下架</button>
                <button class="danger-button" data-action="delete-batch" data-id="${batch.id}">删除</button>
              </div>
            </div>
          </article>
        `;
      }

      function renderFormPreview() {
        const preview = getPreview(state.form);
        if (!preview) {
          return '<div class="helper-text">输入生产日期和保质期后，这里会自动显示下架日和过期日。</div>';
        }

        return `
          <div class="preview-grid">
            <div class="preview-item">
              <div class="preview-label">下架日</div>
              <div class="preview-value">${formatDisplayDate(preview.removalDate)}</div>
            </div>
            <div class="preview-item">
              <div class="preview-label">过期日</div>
              <div class="preview-value">${formatDisplayDate(preview.expiryDate)}</div>
            </div>
          </div>
        `;
      }

      function renderCalculatorPreview() {
        const preview = getPreview(state.calculator);
        if (!preview) {
          return '<div class="helper-text">输入生产日期和保质期后，立即显示计算结果。</div>';
        }

        return `
          <div class="preview-grid">
            <div class="preview-item">
              <div class="preview-label">下架日</div>
              <div class="preview-value">${formatDisplayDate(preview.removalDate)}</div>
            </div>
            <div class="preview-item">
              <div class="preview-label">过期日</div>
              <div class="preview-value">${formatDisplayDate(preview.expiryDate)}</div>
            </div>
          </div>
        `;
      }

      function bindInputs() {
        const searchInput = app.querySelector('[data-input="search"]');
        if (searchInput) {
          searchInput.addEventListener('input', (event) => {
            state.search = event.target.value;
            render();
          });
        }

        app.querySelectorAll('[data-form-input]').forEach((input) => {
          input.addEventListener('input', (event) => {
            state.form[event.target.dataset.formInput] = event.target.value;
            state.formError = '';
            refreshFormPreview();
          });
        });

        app.querySelectorAll('[data-calc-input]').forEach((input) => {
          input.addEventListener('input', (event) => {
            state.calculator[event.target.dataset.calcInput] = event.target.value;
            refreshCalculatorPreview();
          });
        });
      }

      function refreshFormPreview() {
        const node = app.querySelector('[data-form-preview]');
        if (node) node.innerHTML = renderFormPreview();
      }

      function refreshCalculatorPreview() {
        const node = app.querySelector('[data-calculator-preview]');
        if (node) node.innerHTML = renderCalculatorPreview();
      }

      app.addEventListener('click', (event) => {
        const target = event.target.closest('button');
        if (!target) return;

        if (target.dataset.nav) {
          state.page = target.dataset.nav;
          render();
          return;
        }

        if (target.dataset.filter) {
          state.filter = target.dataset.filter;
          render();
          return;
        }

        if (target.dataset.sort) {
          state.sortBy = target.dataset.sort;
          render();
          return;
        }

        if (target.dataset.category) {
          state.form.category = target.dataset.category;
          render();
          return;
        }

        if (target.dataset.formUnit) {
          state.form.shelfLifeUnit = target.dataset.formUnit;
          render();
          return;
        }

        if (target.dataset.calcUnit) {
          state.calculator.shelfLifeUnit = target.dataset.calcUnit;
          render();
          return;
        }

        if (target.dataset.formQuick) {
          state.form.shelfLifeValue = target.dataset.formQuick;
          render();
          return;
        }

        if (target.dataset.calcQuick) {
          state.calculator.shelfLifeValue = target.dataset.calcQuick;
          render();
          return;
        }

        handleAction(target.dataset.action, target);
      });

      function handleAction(action, target) {
        if (action === 'toggle-search') {
          state.searchVisible = !state.searchVisible;
          render();
          return;
        }

        if (action === 'go-add') {
          state.page = 'add';
          state.formError = '';
          render();
          return;
        }

        if (action === 'go-manage') {
          state.page = 'manage';
          state.formError = '';
          render();
          return;
        }

        if (action === 'toggle-group') {
          const key = target.dataset.key;
          if (state.expandedGroups.has(key)) state.expandedGroups.delete(key);
          else state.expandedGroups.add(key);
          render();
          return;
        }

        if (action === 'submit-form') {
          submitForm();
          return;
        }

        if (action === 'archive-batch') {
          state.batches = state.batches.map((batch) => (
            batch.id === target.dataset.id ? { ...batch, archived: true, archivedAt: new Date().toISOString() } : batch
          ));
          saveBatches();
          render();
          return;
        }

        if (action === 'delete-batch') {
          deleteBatch(target.dataset.id);
        }
      }

      function submitForm() {
        const { name, category, productionDate, shelfLifeValue, shelfLifeUnit } = state.form;

        if (!name.trim()) {
          state.formError = '请输入商品名称。';
          render();
          return;
        }

        if (!productionDate) {
          state.formError = '请选择生产日期。';
          render();
          return;
        }

        if (!Number(shelfLifeValue) || Number(shelfLifeValue) <= 0) {
          state.formError = '请输入正确的保质期数值。';
          render();
          return;
        }

        const batch = createBatchRecord({
          id: createId(),
          name,
          category,
          productionDate,
          shelfLifeValue: Number(shelfLifeValue),
          shelfLifeUnit,
        });

        state.batches.unshift(batch);
        saveBatches();
        state.form = createDefaultForm();
        state.formError = '';
        state.page = 'manage';
        state.expandedGroups.add(batch.normalizedName);
        render();
      }

      function deleteBatch(batchId) {
        if (!window.confirm('确定删除这个批次吗？删除后无法恢复。')) return;
        state.batches = state.batches.filter((batch) => batch.id !== batchId);
        saveBatches();
        render();
      }

      function statusText(status) {
        if (status === 'expired') return '已过期';
        if (status === 'removeSoon') return '待处理';
        if (status === 'archived') return '已下架';
        return '正常';
      }

      function formatShortDate(value) {
        const iso = formatIsoDate(value);
        return iso.replace(/^(\d{4})-/, '').replace('-', '-');
      }

      function formatCountdown(days, label) {
        if (days < 0) return `已过 ${Math.abs(days)} 天`;
        if (days === 0) return `今天${label}`;
        return `${days} 天后${label}`;
      }

      function formatExpiryCountdown(days) {
        if (days < 0) return `已过期 ${Math.abs(days)} 天`;
        if (days === 0) return '今天过期';
        return `剩余 ${days} 天`;
      }

      function escapeHtml(value) {
        return String(value || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      render();
    </script>
  </body>
</html>
